<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>個人教育訓練學習護照</title>
    <style>
        /* 重置預設邊距，確保全螢幕滿版 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* 隱藏最外層的滾動條 */
            background-color: #f0f2f5; /* 配合您原本護照系統的背景底色 */
        }
        
        .iframe-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        /* 核心魔法：操控觀景窗 */
        iframe {
            position: absolute;
            top: -55px; /* 【關鍵】將畫面往上推 55 像素，剛好把 Google 橫幅藏到螢幕外 */
            left: 0;
            width: 100%;
            height: calc(100% + 55px); /* 【關鍵】高度要補回 55 像素，下方才不會留白 */
            border: none;
        }
    </style>
</head>
<body>
    <div class="iframe-container">
        <!-- 將 src 裡面的網址，替換成您重新部署後的 GAS 網頁應用程式網址 -->
        <iframe src="https://script.google.com/macros/s/AKfycbzxpSeUh6J4Knnn2zW69h0uz6T14Lsd-uD8Tb6kKHOtFCr8KlrdhrwBgWnrPJezIgh5/exec"></iframe>
    </div>
</body>
</html>
